<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Secret Garden - 秘密花園答題系統</title>
    <style>
        :root {
            --sky-blue: #87CEEB;
            --sky-gradient: linear-gradient(to bottom, #87CEEB 0%, #E0F7FA 100%);
            --soil-brown: #8D6E63;
            --soil-dark: #6D4C41;
            --btn-pink: #FFB6C1;
            --btn-green: #81C784;
            --btn-blue: #64B5F6;
            --btn-orange: #FFB74D;
            --btn-yellow: #FFF176;
            --text-color: #5D4037;
            --modal-bg: #FFFDF9;
        }

        /* 基礎設定 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-color: var(--sky-blue);
        }

        /* --- 主畫面區域 --- */
        .game-scene {
            flex: 1;
            background: var(--sky-gradient);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* 確保內容在螢幕正中間 */
            position: relative;
            padding-top: env(safe-area-inset-top);
        }

        /* 動態雲朵 */
        .cloud {
            position: absolute;
            background: white;
            border-radius: 50px;
            opacity: 0.8;
            animation: cloudFloat 20s linear infinite;
        }
        .cloud::before, .cloud::after { content: ''; position: absolute; background: white; border-radius: 50%; }
        .c1 { width: 80px; height: 30px; top: 10%; left: -100px; animation-duration: 25s; }
        .c1::before { width: 40px; height: 40px; top: -20px; left: 10px; }
        .c2 { width: 120px; height: 40px; top: 15%; left: -150px; animation-duration: 35s; animation-delay: -10s; }
        .c2::before { width: 60px; height: 60px; top: -30px; left: 20px; }

        @keyframes cloudFloat {
            from { transform: translateX(-100px); }
            to { transform: translateX(calc(100vw + 200px)); }
        }

        /* 螢幕正中央的養成區 */
        .center-stage {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            z-index: 2;
        }

        /* 小土丘設計 */
        .soil-mound {
            width: 180px;
            height: 60px;
            background: var(--soil-brown);
            border-radius: 50%; /* 橢圓形土丘 */
            box-shadow: 
                inset 0 -10px 15px var(--soil-dark),
                0 10px 20px rgba(0,0,0,0.1);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .soil-mound::after {
            content: '';
            position: absolute;
            width: 140px;
            height: 40px;
            background: rgba(0,0,0,0.05);
            border-radius: 50%;
            top: 5px;
        }

        /* 互動按鈕組 (三格) */
        .action-group {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 280px;
        }

        .action-btn {
            border: none;
            border-radius: 20px;
            padding: 12px 5px;
            font-size: 0.9rem;
            font-weight: bold;
            color: var(--text-color);
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            transition: transform 0.1s;
        }
        .action-btn:active { transform: translateY(3px); box-shadow: none; }
        
        .btn-water { background-color: var(--btn-blue); color: white; }
        .btn-fertilize { background-color: var(--btn-orange); color: white; }
        .btn-sun { background-color: var(--btn-yellow); }

        .plant-btn-main {
            margin-top: 10px;
            background: var(--btn-green);
            color: white;
            border: none;
            padding: 12px 40px;
            border-radius: 40px;
            font-size: 1.1rem;
            font-weight: bold;
            box-shadow: 0 5px 0 #66BB6A;
        }

        /* --- 雙列導覽列 --- */
        nav {
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 12px calc(15px + env(safe-area-inset-bottom));
            border-top: 1px solid #EEE;
            z-index: 10;
        }
        .nav-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 12px;
        }
        .nav-row:last-child { margin-bottom: 0; }
        .nav-btn {
            background: white;
            border: 2px solid var(--btn-pink);
            border-radius: 15px;
            padding: 10px 0;
            text-align: center;
            font-size: 0.85rem;
            font-weight: bold;
            color: var(--text-color);
            box-shadow: 0 4px 0 var(--btn-pink);
        }

        /* --- 彈窗 --- */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--modal-bg);
            z-index: 100;
            display: flex;
            flex-direction: column;
            transform: translateY(100%);
            transition: transform 0.3s ease-out;
            padding-top: env(safe-area-inset-top);
        }
        .modal.active { transform: translateY(0); }
        .modal-header {
            padding: 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px dashed var(--btn-pink);
        }
        .back-btn {
            background: var(--btn-pink);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 25px;
            font-weight: bold;
        }
        .modal-body { flex: 1; padding: 20px; overflow-y: auto; }

        .seed-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .seed-card {
            background: white;
            border: 2px solid #F0F0F0;
            border-radius: 20px;
            padding: 20px 10px;
            text-align: center;
        }
        /* 題庫清單樣式 */
.bank-header {
    display: flex;
    flex-direction: column;
    gap: 15px;
    margin-bottom: 20px;
}

.upload-label {
    background: var(--btn-blue);
    color: white;
    padding: 12px;
    border-radius: 15px;
    text-align: center;
    font-weight: bold;
    cursor: pointer;
    display: block;
}

.file-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.file-item {
    background: white;
    border: 2px solid #EEE;
    border-radius: 15px;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
}

.file-info {
    flex: 1;
}

.file-title {
    font-weight: bold;
    color: var(--text-color);
    display: block;
}

.file-date {
    font-size: 0.75rem;
    color: #AAA;
}

.delete-btn {
    background: #FF8A80;
    color: white;
    border: none;
    padding: 5px 12px;
    border-radius: 10px;
    font-size: 0.8rem;
    margin-left: 10px;
}
        
    </style>
</head>
<body>

    <div class="game-scene">
        <div class="cloud c1"></div>
        <div class="cloud c2"></div>
        
        <div class="center-stage">
            <div class="soil-mound" id="garden-soil"></div>
            
            <div class="action-group">
                <button class="action-btn btn-water" onclick="action('澆水')"><span>💧</span>澆水</button>
                <button class="action-btn btn-fertilize" onclick="action('施肥')"><span>💩</span>施肥</button>
                <button class="action-btn btn-sun" onclick="action('曬太陽')"><span>☀️</span>太陽</button>
            </div>

            <button class="plant-btn-main" onclick="openModal('seed')">🌱 開始種植</button>
        </div>
    </div>

    <nav>
        <div class="nav-row">
            <div class="nav-btn" onclick="openModal('backpack')">🎒 背包</div>
            <div class="nav-btn" onclick="openModal('shop')">🛒 商店</div>
            <div class="nav-btn" style="background:#FFF9C4" onclick="openModal('quiz')">📝 答題</div>
            <div class="nav-btn" onclick="openModal('player')">👤 玩家</div>
        </div>
        <div class="nav-row">
            <div class="nav-btn" onclick="openModal('exam')">📄 考卷</div>
            <div class="nav-btn" onclick="openModal('bank')">📚 題庫</div>
            <div class="nav-btn" onclick="openModal('wrong')">❌ 錯題</div>
            <div class="nav-btn" onclick="openModal('settings')">⚙️ 設定</div>
        </div>
    </nav>

    <div id="full-modal" class="modal">
        <div class="modal-header">
            <h2 id="modal-title">標題</h2>
            <button class="back-btn" onclick="closeModal()">返回 ↩</button>
        </div>
        <div id="modal-content" class="modal-body"></div>
    </div>

    <script>
// 1. 初始化資料 (確保放在程式碼最上方)
let questionBanks = [];
try {
    const savedData = localStorage.getItem('myQuestionBanks');
    questionBanks = savedData ? JSON.parse(savedData) : [];
} catch (e) {
    console.error("讀取題庫失敗:", e);
    questionBanks = [];
}

// 2. 強化版的 openModal
function openModal(type) {
    const modal = document.getElementById('full-modal');
    const title = document.getElementById('modal-title');
    const content = document.getElementById('modal-content');

    // 如果找不到容器，在控制台報錯
    if (!modal || !content) {
        console.error("找不到 Modal 元素，請檢查 HTML ID 是否正確");
        return;
    }

    // 先清空內容，確保乾淨
    content.innerHTML = '';

    if (type === 'bank') {
        title.innerText = "題庫管理";
        // 傳入 content 進行渲染
        renderBankList(content);
    } else if (type === 'seed') {
        title.innerText = "種子商店";
        content.innerHTML = `<div style="text-align:center; padding:50px;">🌱 種子開發中...</div>`;
    } else {
        title.innerText = type.toUpperCase();
        content.innerHTML = `<div style="text-align:center; padding-top:50px;">這是 ${type} 的介面</div>`;
    }

    modal.classList.add('active');
}

// 3. 確保 renderBankList 包含 HTML 結構
function renderBankList(container) {
    let listHtml = `
        <div class="bank-header" style="padding: 10px; text-align: center;">
            <label class="upload-label" style="background: #4CAF50; color: white; padding: 12px 20px; border-radius: 10px; cursor: pointer; display: inline-block; font-weight: bold;">
                📂 點擊上傳阿摩 HTML 題庫
                <input type="file" id="fileInput" accept=".html" style="display:none" onchange="handleFileUpload(event)">
            </label>
            <p style="font-size:0.8rem; color:#888; margin-top:10px;">請選擇從阿摩下載的 .html 檔案</p>
        </div>
        <hr style="border:0; border-top:1px solid #EEE; margin: 15px 0;">
        <div class="file-list" id="bankItems">
    `;

    if (questionBanks.length === 0) {
        listHtml += `<div style="text-align:center; color:#AAA; padding:30px;">目前尚無題庫資料</div>`;
    } else {
        questionBanks.forEach((bank, index) => {
            listHtml += `
                <div class="file-item" style="display:flex; justify-content:space-between; align-items:center; background:#f9f9f9; margin-bottom:10px; padding:15px; border-radius:12px; border:1px solid #EEE;">
                    <div style="text-align:left;">
                        <div style="font-weight:bold; color:#333;">📘 ${bank.title}</div>
                        <div style="font-size:0.75rem; color:#999;">${bank.date} | 共 ${bank.count || 0} 題</div>
                    </div>
                    <button onclick="deleteBank(${index})" style="background:#FF5252; color:white; border:none; padding:6px 12px; border-radius:8px; cursor:pointer;">刪除</button>
                </div>
            `;
        });
    }
    listHtml += `</div>`;
    container.innerHTML = listHtml;
}
    
function handleFileUpload(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
        const content = e.target.result;
        const parser = new DOMParser();
        const doc = parser.parseFromString(content, 'text/html');

        // --- 優化標題抓取 ---
        // 優先找阿摩的「考試名稱」區塊，找不到再找 <title>，最後才是檔名
        const amolTitle = doc.querySelector('.MuiTypography-pageTitleSmall')?.innerText;
        const htmlTitle = doc.querySelector('title')?.innerText;
        const fileTitle = (amolTitle || htmlTitle || file.name).replace('考試名稱：', '').trim();

        // --- 解析題目數量 (選擇性功能) ---
        const questionCount = doc.querySelectorAll('.border-b.border-gray-200').length;

        const newBank = {
            id: Date.now(),
            title: fileTitle,
            count: questionCount, // 記錄題數
            content: content,
            date: new Date().toLocaleDateString()
        };

        questionBanks.push(newBank);
        saveAndRefresh();
    };
    reader.readAsText(file);
}

// 刪除題庫
function deleteBank(index) {
    if (confirm('確定要刪除這個題庫嗎？')) {
        questionBanks.splice(index, 1);
        saveAndRefresh();
    }
}

// 儲存至本地並重新整理介面
function saveAndRefresh() {
    localStorage.setItem('myQuestionBanks', JSON.stringify(questionBanks));
    const content = document.getElementById('modal-content');
    renderBankList(content);
}


        
        const seedData = [
            {n:'向日葵', i:'🌻', c:5}, {n:'鬱金香', i:'🌷', c:2},
            {n:'玫瑰花', i:'🌹', c:1}, {n:'櫻花樹', i:'🌸', c:8},
            {n:'扶桑花', i:'🌺', c:3}, {n:'雛菊花', i:'🌼', c:10},
            {n:'四葉草', i:'🍀', c:0}, {n:'仙人掌', i:'🌵', c:4},
            {n:'薰衣草', i:'🌿', c:6}, {n:'奇幻菇', i:'🍄', c:1}
        ];

        function action(type) {
            alert('你對小土丘進行了：' + type);
            // 這裡未來可以加入土丘顏色變深或出現水滴動畫的邏輯
        }

        function openModal(type) {
            const modal = document.getElementById('full-modal');
            const title = document.getElementById('modal-title');
            const content = document.getElementById('modal-content');
            
            if(type === 'seed') {
                title.innerText = "選擇種子";
                let html = '<div class="seed-grid">';
                seedData.forEach(s => {
                    html += `
                    <div class="seed-card" onclick="plantSeed('${s.i}'); closeModal();">
                        <span style="font-size:3rem;">${s.i}</span>
                        <div style="font-weight:bold; margin-top:5px;">${s.n}</div>
                        <div style="font-size:0.8rem; color:#888;">擁有：${s.c}</div>
                    </div>`;
                });
                html += '</div>';
                content.innerHTML = html;
            } else {
                title.innerText = type.toUpperCase();
                content.innerHTML = `<div style="text-align:center; padding-top:50px;">這是 ${type} 的介面</div>`;
            }
            modal.classList.add('active');
        }

        function plantSeed(img) {
            document.getElementById('garden-soil').innerHTML = `<span style="font-size:3.5rem; transform:translateY(-25px);">${img}</span>`;
        }

        function closeModal() {
            document.getElementById('full-modal').classList.remove('active');
        }
    </script>
</body>
</html>
