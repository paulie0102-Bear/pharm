<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Secret Garden - 秘密花園答題系統</title>
    <style>
        :root {
            --sky-blue: #87CEEB;
            --sky-gradient: linear-gradient(to bottom, #87CEEB 0%, #E0F7FA 100%);
            --soil-brown: #8D6E63;
            --soil-dark: #6D4C41;
            --btn-pink: #FFB6C1;
            --btn-green: #81C784;
            --btn-blue: #64B5F6;
            --btn-orange: #FFB74D;
            --btn-yellow: #FFF176;
            --text-color: #5D4037;
            --modal-bg: #FFFDF9;
        }

        /* 基礎設定 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-color: var(--sky-blue);
        }

        /* --- 主畫面區域 --- */
        .game-scene {
            flex: 1;
            background: var(--sky-gradient);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* 確保內容在螢幕正中間 */
            position: relative;
            padding-top: env(safe-area-inset-top);
        }

        /* 動態雲朵 */
        .cloud {
            position: absolute;
            background: white;
            border-radius: 50px;
            opacity: 0.8;
            animation: cloudFloat 20s linear infinite;
        }
        .cloud::before, .cloud::after { content: ''; position: absolute; background: white; border-radius: 50%; }
        .c1 { width: 80px; height: 30px; top: 10%; left: -100px; animation-duration: 25s; }
        .c1::before { width: 40px; height: 40px; top: -20px; left: 10px; }
        .c2 { width: 120px; height: 40px; top: 15%; left: -150px; animation-duration: 35s; animation-delay: -10s; }
        .c2::before { width: 60px; height: 60px; top: -30px; left: 20px; }

        @keyframes cloudFloat {
            from { transform: translateX(-100px); }
            to { transform: translateX(calc(100vw + 200px)); }
        }

        /* 螢幕正中央的養成區 */
        .center-stage {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            z-index: 2;
        }

        /* 小土丘設計 */
        .soil-mound {
            width: 180px;
            height: 60px;
            background: var(--soil-brown);
            border-radius: 50%; /* 橢圓形土丘 */
            box-shadow: 
                inset 0 -10px 15px var(--soil-dark),
                0 10px 20px rgba(0,0,0,0.1);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .soil-mound::after {
            content: '';
            position: absolute;
            width: 140px;
            height: 40px;
            background: rgba(0,0,0,0.05);
            border-radius: 50%;
            top: 5px;
        }

        /* 互動按鈕組 (三格) */
        .action-group {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 280px;
        }

        .action-btn {
            border: none;
            border-radius: 20px;
            padding: 12px 5px;
            font-size: 0.9rem;
            font-weight: bold;
            color: var(--text-color);
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            transition: transform 0.1s;
        }
        .action-btn:active { transform: translateY(3px); box-shadow: none; }
        
        .btn-water { background-color: var(--btn-blue); color: white; }
        .btn-fertilize { background-color: var(--btn-orange); color: white; }
        .btn-sun { background-color: var(--btn-yellow); }

        .plant-btn-main {
            margin-top: 10px;
            background: var(--btn-green);
            color: white;
            border: none;
            padding: 12px 40px;
            border-radius: 40px;
            font-size: 1.1rem;
            font-weight: bold;
            box-shadow: 0 5px 0 #66BB6A;
        }

        /* --- 雙列導覽列 --- */
        nav {
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 12px calc(15px + env(safe-area-inset-bottom));
            border-top: 1px solid #EEE;
            z-index: 10;
        }
        .nav-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 12px;
        }
        .nav-row:last-child { margin-bottom: 0; }
        .nav-btn {
            background: white;
            border: 2px solid var(--btn-pink);
            border-radius: 15px;
            padding: 10px 0;
            text-align: center;
            font-size: 0.85rem;
            font-weight: bold;
            color: var(--text-color);
            box-shadow: 0 4px 0 var(--btn-pink);
        }

        /* --- 彈窗 --- */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--modal-bg);
            z-index: 100;
            display: flex;
            flex-direction: column;
            transform: translateY(100%);
            transition: transform 0.3s ease-out;
            padding-top: env(safe-area-inset-top);
        }
        .modal.active { transform: translateY(0); }
        .modal-header {
            padding: 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px dashed var(--btn-pink);
        }
        .back-btn {
            background: var(--btn-pink);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 25px;
            font-weight: bold;
        }
        .modal-body { flex: 1; padding: 20px; overflow-y: auto; }

        .seed-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .seed-card {
            background: white;
            border: 2px solid #F0F0F0;
            border-radius: 20px;
            padding: 20px 10px;
            text-align: center;
        }
        /* 題庫清單樣式 */
.bank-header {
    display: flex;
    flex-direction: column;
    gap: 15px;
    margin-bottom: 20px;
}

.upload-label {
    background: var(--btn-blue);
    color: white;
    padding: 12px;
    border-radius: 15px;
    text-align: center;
    font-weight: bold;
    cursor: pointer;
    display: block;
}

.file-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.file-item {
    background: white;
    border: 2px solid #EEE;
    border-radius: 15px;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
}

.file-info {
    flex: 1;
}

.file-title {
    font-weight: bold;
    color: var(--text-color);
    display: block;
}

.file-date {
    font-size: 0.75rem;
    color: #AAA;
}

.delete-btn {
    background: #FF8A80;
    color: white;
    border: none;
    padding: 5px 12px;
    border-radius: 10px;
    font-size: 0.8rem;
    margin-left: 10px;
}
        
    </style>
</head>
<body>

    <div class="game-scene">
        <div class="cloud c1"></div>
        <div class="cloud c2"></div>
        
        <div class="center-stage">
            <div class="soil-mound" id="garden-soil"></div>
            
            <div class="action-group">
                <button class="action-btn btn-water" onclick="action('澆水')"><span>💧</span>澆水</button>
                <button class="action-btn btn-fertilize" onclick="action('施肥')"><span>💩</span>施肥</button>
                <button class="action-btn btn-sun" onclick="action('曬太陽')"><span>☀️</span>太陽</button>
            </div>

            <button class="plant-btn-main" onclick="openModal('seed')">🌱 開始種植</button>
        </div>
    </div>

    <nav>
        <div class="nav-row">
            <div class="nav-btn" onclick="openModal('backpack')">🎒 背包</div>
            <div class="nav-btn" onclick="openModal('shop')">🛒 商店</div>
            <div class="nav-btn" style="background:#FFF9C4" onclick="openModal('quiz')">📝 答題</div>
            <div class="nav-btn" onclick="openModal('player')">👤 玩家</div>
        </div>
        <div class="nav-row">
            <div class="nav-btn" onclick="openModal('exam')">📄 考卷</div>
            <div class="nav-btn" onclick="openModal('bank')">📚 題庫</div>
            <div class="nav-btn" onclick="openModal('wrong')">❌ 錯題</div>
            <div class="nav-btn" onclick="openModal('settings')">⚙️ 設定</div>
        </div>
    </nav>

    <div id="full-modal" class="modal">
        <div class="modal-header">
            <h2 id="modal-title">標題</h2>
            <button class="back-btn" onclick="closeModal()">返回 ↩</button>
        </div>
        <div id="modal-content" class="modal-body"></div>
    </div>

    <script>
// 1. 初始化資料 (確保放在程式碼最上方)
let questionBanks = [];
try {
    const savedData = localStorage.getItem('myQuestionBanks');
    questionBanks = savedData ? JSON.parse(savedData) : [];
} catch (e) {
    console.error("讀取題庫失敗:", e);
    questionBanks = [];
}
let myExams = [];
try {
    const savedExams = localStorage.getItem('myExams');
    myExams = savedExams ? JSON.parse(savedExams) : [];
} catch (e) {
    myExams = [];
}
let currentQuiz = {
    questions: [],
    currentIndex: 0,
    userAnswers: [],
    examId: null,
    examName: ""
};
        
let wrongQuestions = []; // 存放所有錯題的集合
let quizRecords = [];    // 存放歷次答題紀錄

try {
    wrongQuestions = JSON.parse(localStorage.getItem('myWrongQuestions')) || [];
    quizRecords = JSON.parse(localStorage.getItem('myQuizRecords')) || [];
} catch (e) {
    wrongQuestions = [];
    quizRecords = [];
}
        
function openModal(type) {
    const modal = document.getElementById('full-modal');
    const title = document.getElementById('modal-title');
    const content = document.getElementById('modal-content');
    
    if (!modal || !content) return;

    // 清空舊內容
    content.innerHTML = '';

    if (type === 'bank') {
        // --- 題庫管理邏輯 ---
        title.innerText = "題庫管理";
        renderBankList(content);
        } else if (type === 'exam') {
        title.innerText = "考卷管理";
        renderExamList(content);
        } else if (type === 'quiz') {
        title.innerText = "開始測驗";
    renderQuizSettings(content);
        } else if (type === 'wrong') {
        title.innerText = "錯題與紀錄";
    renderWrongArea(content);
        } else if (type === 'player') {
        title.innerText = "訓練家資訊";
    renderPlayerPage(content);
        } else if (type === 'bag') {
        title.innerText = "我的背包";
    renderBackpack(content);
    } else if (type === 'seed') {
        // --- 種子選擇邏輯 ---
        title.innerText = "選擇種子";
        let html = '<div class="seed-grid">';
        seedData.forEach(s => {
            html += `
            <div class="seed-card" onclick="plantSeed('${s.i}'); closeModal();">
                <span style="font-size:3rem;">${s.i}</span>
                <div style="font-weight:bold; margin-top:5px;">${s.n}</div>
                <div style="font-size:0.8rem; color:#888;">擁有：${s.c}</div>
            </div>`;
        });
        html += '</div>';
        content.innerHTML = html;
    } else {
        // --- 其他預設邏輯 ---
        title.innerText = type.toUpperCase();
        content.innerHTML = `<div style="text-align:center; padding-top:50px;">這是 ${type} 的介面</div>`;
    }

    modal.classList.add('active');
}

// 3. 確保 renderBankList 包含 HTML 結構
function renderBankList(container) {
    let listHtml = `
        <div class="bank-header" style="padding: 10px; text-align: center;">
            <label class="upload-label" style="background: #4CAF50; color: white; padding: 12px 20px; border-radius: 10px; cursor: pointer; display: inline-block; font-weight: bold;">
                📂 點擊上傳阿摩 HTML 題庫
                <input type="file" id="fileInput" accept=".html" style="display:none" onchange="handleFileUpload(event)">
            </label>
            <p style="font-size:0.8rem; color:#888; margin-top:10px;">請選擇從阿摩下載的 .html 檔案</p>
        </div>
        <hr style="border:0; border-top:1px solid #EEE; margin: 15px 0;">
        <div class="file-list" id="bankItems">
    `;

    if (questionBanks.length === 0) {
        listHtml += `<div style="text-align:center; color:#AAA; padding:30px;">目前尚無題庫資料</div>`;
    } else {
        questionBanks.forEach((bank, index) => {
            listHtml += `
                <div class="file-item" style="display:flex; justify-content:space-between; align-items:center; background:#f9f9f9; margin-bottom:10px; padding:15px; border-radius:12px; border:1px solid #EEE;">
                    <div style="text-align:left;">
                        <div style="font-weight:bold; color:#333;">📘 ${bank.title}</div>
                        <div style="font-size:0.75rem; color:#999;">${bank.date} | 共 ${bank.count || 0} 題</div>
                    </div>
                    <button onclick="deleteBank(${index})" style="background:#FF5252; color:white; border:none; padding:6px 12px; border-radius:8px; cursor:pointer;">刪除</button>
                </div>
            `;
        });
    }
    listHtml += `</div>`;
    container.innerHTML = listHtml;
}
    
function handleFileUpload(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
        const content = e.target.result;
        const parser = new DOMParser();
        const doc = parser.parseFromString(content, 'text/html');

        // --- 優化標題抓取 ---
        // 優先找阿摩的「考試名稱」區塊，找不到再找 <title>，最後才是檔名
        const amolTitle = doc.querySelector('.MuiTypography-pageTitleSmall')?.innerText;
        const htmlTitle = doc.querySelector('title')?.innerText;
        const fileTitle = (amolTitle || htmlTitle || file.name).replace('考試名稱：', '').trim();

        // --- 解析題目數量 (選擇性功能) ---
        const questionCount = doc.querySelectorAll('.border-b.border-gray-200').length;

        const newBank = {
            id: Date.now(),
            title: fileTitle,
            count: questionCount, // 記錄題數
            content: content,
            date: new Date().toLocaleDateString()
        };

        questionBanks.push(newBank);
        saveAndRefresh();
    };
    reader.readAsText(file);
}

// 刪除題庫
function deleteBank(index) {
    if (confirm('確定要刪除這個題庫嗎？')) {
        questionBanks.splice(index, 1);
        saveAndRefresh();
    }
}

// 儲存至本地並重新整理介面
function saveAndRefresh() {
    localStorage.setItem('myQuestionBanks', JSON.stringify(questionBanks));
    // 確保重新渲染時是針對 modal 內的 content
    const content = document.getElementById('modal-content');
    if(content) renderBankList(content);
}
// --- 考卷列表頁面 ---
function renderExamList(container) {
    let html = `
        <div style="padding: 10px; text-align: center;">
            <button onclick="openCreateExam()" style="background: #FFB74D; color: white; border: none; padding: 12px 25px; border-radius: 30px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 #F57C00;">
                ➕ 生成新考卷
            </button>
        </div>
        <hr style="border:0; border-top:1px solid #EEE; margin: 15px 0;">
        <div id="examItems">
    `;

    if (myExams.length === 0) {
        html += `<div style="text-align:center; color:#AAA; padding:40px;">目前尚無考卷，請點擊上方按鈕生成。</div>`;
    } else {
        myExams.forEach((exam, index) => {
            html += `
                <div class="file-item" style="display:flex; justify-content:space-between; align-items:center; background:white; margin-bottom:12px; padding:15px; border-radius:15px; border:1px solid #EEE;">
                    <div style="text-align:left;">
                        <div style="font-weight:bold; color:#5D4037;">📄 ${exam.name}</div>
                        <div style="font-size:0.75rem; color:#999;">包含 ${exam.bankCount} 個題庫 | 共 ${exam.totalQuestions} 題</div>
                    </div>
                    <button onclick="deleteExam(${index})" style="background:#FF8A80; color:white; border:none; padding:6px 12px; border-radius:8px; cursor:pointer;">刪除</button>
                </div>
            `;
        });
    }
    html += `</div>`;
    container.innerHTML = html;
}

// --- 開啟「生成考卷」的全螢幕選擇介面 ---
function openCreateExam() {
    // 建立一個臨時的全螢幕層
    const overlay = document.createElement('div');
    overlay.id = 'create-exam-overlay';
    overlay.style = "position:fixed; top:0; left:0; width:100%; height:100%; background:#FFFDF9; z-index:200; display:flex; flex-direction:column; padding-top:env(safe-area-inset-top);";
    
    let bankOptions = '';
    if (questionBanks.length === 0) {
        bankOptions = '<p style="text-align:center; color:red; padding:20px;">請先到「題庫區」上傳 HTML 檔案！</p>';
    } else {
        questionBanks.forEach((bank, idx) => {
            bankOptions += `
                <label style="display:flex; align-items:center; padding:15px; background:white; border-radius:12px; margin-bottom:10px; border:1px solid #EEE;">
                    <input type="checkbox" name="selectBank" value="${idx}" style="width:20px; height:20px; margin-right:15px;">
                    <div>
                        <div style="font-weight:bold;">${bank.title}</div>
                        <div style="font-size:0.8rem; color:#888;">${bank.count} 題</div>
                    </div>
                </label>
            `;
        });
    }

    overlay.innerHTML = `
        <div style="padding:18px; display:flex; align-items:center; justify-content:space-between; border-bottom:2px dashed #FFB6C1;">
            <h2 style="font-size:1.2rem; color:#5D4037;">生成新考卷</h2>
            <button onclick="document.getElementById('create-exam-overlay').remove()" style="background:#EEE; border:none; padding:8px 15px; border-radius:20px;">取消</button>
        </div>
        <div style="flex:1; padding:20px; overflow-y:auto;">
            <p style="margin-bottom:10px; font-weight:bold; color:#888;">1. 選擇要加入的題庫（可複選）：</p>
            ${bankOptions}
            <div style="margin-top:20px;">
                <p style="margin-bottom:10px; font-weight:bold; color:#888;">2. 輸入考卷名稱：</p>
                <input type="text" id="newExamName" placeholder="例如：115年醫事法規模擬卷" style="width:100%; padding:12px; border-radius:10px; border:1px solid #DDD; font-size:1rem;">
            </div>
        </div>
        <div style="padding:20px; border-top:1px solid #EEE;">
            <button onclick="confirmCreateExam()" style="width:100%; background:#4CAF50; color:white; border:none; padding:15px; border-radius:15px; font-size:1.1rem; font-weight:bold; box-shadow: 0 4px 0 #2E7D32;">確認生成</button>
        </div>
    `;
    document.body.appendChild(overlay);
}

// --- 確認生成邏輯 ---
function confirmCreateExam() {
    const selectedIndexes = Array.from(document.querySelectorAll('input[name="selectBank"]:checked')).map(cb => cb.value);
    const examName = document.getElementById('newExamName').value.trim();

    if (selectedIndexes.length === 0) {
        alert('請至少選擇一個題庫！');
        return;
    }
    if (!examName) {
        alert('請輸入考卷名稱！');
        return;
    }

    // 計算總題數並合併內容
    let totalQ = 0;
    let combinedContent = [];
    selectedIndexes.forEach(idx => {
        const bank = questionBanks[idx];
        totalQ += bank.count;
        combinedContent.push(bank.content);
    });

    const newExam = {
        id: Date.now(),
        name: examName,
        bankCount: selectedIndexes.length,
        totalQuestions: totalQ,
        contents: combinedContent, // 存入合併的 HTML 原始碼
        date: new Date().toLocaleDateString()
    };

    myExams.push(newExam);
    localStorage.setItem('myExams', JSON.stringify(myExams));
    
    // 移除遮罩並重新渲染列表
    document.getElementById('create-exam-overlay').remove();
    renderExamList(document.getElementById('modal-content'));
}

// --- 刪除考卷 ---
function deleteExam(index) {
    if (confirm('確定要刪除這份考卷嗎？')) {
        myExams.splice(index, 1);
        localStorage.setItem('myExams', JSON.stringify(myExams));
        renderExamList(document.getElementById('modal-content'));
    }
}

function renderQuizSettings(container) {
    if (myExams.length === 0) {
        container.innerHTML = `<div style="text-align:center; color:#AAA; padding:40px;">請先到「考卷區」生成考卷。</div>`;
        return;
    }

    let examOptions = myExams.map((ex, i) => `<option value="${i}">${ex.name} (${ex.totalQuestions}題)</option>`).join('');

    container.innerHTML = `
        <div style="padding:15px; display:flex; flex-direction:column; gap:20px;">
            <div>
                <p style="font-weight:bold; margin-bottom:8px;">1. 選擇出題範圍</p>
                <select id="quizScope" style="width:100%; padding:12px; border-radius:10px; border:1px solid #DDD;">${examOptions}</select>
            </div>
            <div>
                <p style="font-weight:bold; margin-bottom:8px;">2. 題目順序</p>
                <div style="display:flex; gap:10px;">
                    <button class="opt-btn active" id="orderNormal" onclick="setOrder(false)" style="flex:1; padding:10px; border-radius:10px; border:1px solid #4CAF50;">按照題序</button>
                    <button class="opt-btn" id="orderRandom" onclick="setOrder(true)" style="flex:1; padding:10px; border-radius:10px; border:1px solid #EEE;">打亂題序</button>
                </div>
            </div>
            <div>
                <p style="font-weight:bold; margin-bottom:8px;">3. 本次測驗題數</p>
                <input type="number" id="quizCount" value="10" min="1" style="width:100%; padding:12px; border-radius:10px; border:1px solid #DDD;">
            </div>
            <button onclick="startQuiz()" style="width:100%; background:#4CAF50; color:white; padding:15px; border-radius:15px; font-size:1.2rem; font-weight:bold; margin-top:10px; border:none; box-shadow:0 4px 0 #2E7D32;">🚀 開始答題</button>

let isRandom = false;
function setOrder(random) {
    isRandom = random;
    document.getElementById('orderNormal').style.border = random ? '1px solid #EEE' : '1px solid #4CAF50';
    document.getElementById('orderRandom').style.border = random ? '1px solid #4CAF50' : '1px solid #EEE';
    document.getElementById('orderNormal').classList.toggle('active', !random);
    document.getElementById('orderRandom').classList.toggle('active', random);
}
function startQuiz() {
    const examIndex = document.getElementById('quizScope').value;
    const targetCount = parseInt(document.getElementById('quizCount').value);
    const selectedExam = myExams[examIndex];

    // 1. 從所有 HTML 內容中解析出所有題目
    let allQuestions = [];
    selectedExam.contents.forEach(html => {
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        const items = doc.querySelectorAll('.border-b.border-gray-200');
        items.forEach(item => {
            const ans = item.querySelector('.text-center')?.innerText.trim();
            const text = item.querySelector('.break-words')?.innerText.trim();
            if (text) allQuestions.push({ answer: ans, text: text });
        });
    });

    // 2. 處理隨機
    if (isRandom) allQuestions.sort(() => Math.random() - 0.5);

    // 3. 擷取本次要做的題目
    const quizQuestions = allQuestions.slice(0, targetCount);
    const remainingQuestions = allQuestions.slice(targetCount);

    // 4. 更新考卷區 (覆蓋進度)
    if (remainingQuestions.length > 0) {
        // 將剩餘題目封裝回原本的考卷 (這裡簡化處理，將剩餘題目存為文字描述)
        selectedExam.totalQuestions = remainingQuestions.length;
        // 注意：為了簡化，這裡建議將解析後的結構存起來，或重新生成簡化版 HTML
        // 這裡暫時更新題數，讓使用者知道考卷變少了
        myExams[examIndex].totalQuestions = remainingQuestions.length;
        localStorage.setItem('myExams', JSON.stringify(myExams));
    } else {
        // 如果全做完了，刪除該考卷
        myExams.splice(examIndex, 1);
        localStorage.setItem('myExams', JSON.stringify(myExams));
    }

    // 5. 初始化測驗狀態
    currentQuiz.questions = quizQuestions;
    currentQuiz.currentIndex = 0;
    currentQuiz.userAnswers = new Array(quizQuestions.length).fill(null);
    currentQuiz.examName = selectedExam.name;

    renderQuestion();
}

function renderQuestion() {
    const q = currentQuiz.questions[currentQuiz.currentIndex];
    const content = document.getElementById('modal-content');
    const isLast = currentQuiz.currentIndex === currentQuiz.questions.length - 1;

    content.innerHTML = `
        <div style="padding:10px; position:relative;">
            <div style="position:absolute; right:10px; top:0; color:#888; font-weight:bold;">
                ${currentQuiz.currentIndex + 1} / ${currentQuiz.questions.length}
            </div>
            <div style="margin-top:30px; font-size:1.1rem; line-height:1.6; color:#333; min-height:150px;">
                ${q.text}
            </div>
            
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:20px;">
                ${['A', 'B', 'C', 'D'].map(opt => `
                    <button onclick="selectAnswer('${opt}')" style="padding:15px; border-radius:12px; border:2px solid ${currentQuiz.userAnswers[currentQuiz.currentIndex] === opt ? '#4CAF50' : '#EEE'}; background:white; font-weight:bold;">
                        ${opt}
                    </button>
                `).join('')}
            </div>

            <div style="display:flex; justify-content:space-between; margin-top:40px; gap:15px;">
                <button onclick="prevQ()" style="flex:1; padding:12px; border-radius:10px; background:#DDD; border:none;" ${currentQuiz.currentIndex === 0 ? 'disabled' : ''}>上一題</button>
                ${isLast 
                    ? `<button onclick="finishQuiz()" style="flex:2; padding:12px; border-radius:10px; background:#FF9800; color:white; border:none; font-weight:bold;">答題完成，批改</button>`
                    : `<button onclick="nextQ()" style="flex:1; padding:12px; border-radius:10px; background:var(--btn-blue); color:white; border:none;">下一題</button>`
                }
            </div>
        </div>
    `;
}

function selectAnswer(ans) {
    currentQuiz.userAnswers[currentQuiz.currentIndex] = ans;
    renderQuestion();
}

function nextQ() { if(currentQuiz.currentIndex < currentQuiz.questions.length - 1) { currentQuiz.currentIndex++; renderQuestion(); } }
function prevQ() { if(currentQuiz.currentIndex > 0) { currentQuiz.currentIndex--; renderQuestion(); } }

function finishQuiz() {
    let correctCount = 0;
    const results = currentQuiz.questions.map((q, i) => {
        const isCorrect = q.answer === currentQuiz.userAnswers[i];
        if (isCorrect) correctCount++;
        return { 
            qText: q.text, 
            userAns: currentQuiz.userAnswers[i], 
            correctAns: q.answer, 
            isCorrect: isCorrect 
        };
    });

    const reward = correctCount * 10;
    
    // 更新玩家金錢 (如果有定義全域變數 s)
    if (typeof s !== 'undefined') {
        s.money += reward;
        // 如果有存檔機制，記得在這裡執行 saveGame();
    }

    // 1. 提取錯題存入錯題區
    const currentWrongOnes = results.filter(r => !r.isCorrect);
    if (currentWrongOnes.length > 0) {
        const wrongEntry = {
            id: Date.now(),
            title: `${currentQuiz.examName}-錯題`,
            date: new Date().toLocaleDateString(),
            questions: currentWrongOnes

    // 2. 存入答題紀錄
    const recordEntry = {

        totalCount: currentQuiz.questions.length,
        reward: reward,
        details: results 
    };
    quizRecords.push(recordEntry);
    localStorage.setItem('myQuizRecords', JSON.stringify(quizRecords));
    
    // 3. 準備顯示畫面
    const content = document.getElementById('modal-content');

    // 頂部統計區
    let resultHtml = `

        if (i > 0 && i % 10 === 0) {

        }

        resultHtml += `
            <div style="padding:15px; background:${r.isCorrect ? '#E8F5E9' : '#FFEBEE'}; border-radius:15px; margin-bottom:15px; font-size:0.9rem; border: 1px solid ${r.isCorrect ? '#C8E6C9' : '#FFCDD2'};">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">

                    <a href="${googleLink}" target="_blank" style="background:#4285F4; color:white; padding:5px 12px; border-radius:10px; text-decoration:none; font-size:0.75rem; font-weight:bold; box-shadow:0 2px 4px rgba(66,133,244,0.3);">🔍 阿摩詳解</a>

// 錯題匯出成考卷
function exportWrongToExam() {
    const selected = Array.from(document.querySelectorAll('input[name="exportWrong"]:checked')).map(cb => cb.value);
    if (selected.length === 0) { alert('請至少選擇一個錯題集'); return; }

    const examName = prompt('請輸入新考卷名稱：', '錯題重測-' + new Date().toLocaleDateString());
    if (!examName) return;

    let combinedQuestions = [];
    selected.forEach(idx => {
        // 將錯題格式轉回原本 HTML 解析器能讀的格式（或直接模擬解析後的結構）
        const entry = wrongQuestions[idx];
        entry.questions.forEach(q => {
            // 這裡為了保持系統一致性，我們將其封裝為簡化版 HTML 結構
            const mockHtml = `<div class="border-b border-gray-200"><div class="text-center">${q.correctAns}</div><div class="break-words">${q.qText}</div></div>`;
            combinedQuestions.push(mockHtml);
        });
    });

    const newExam = {
        id: Date.now(),
        name: examName,
        bankCount: selected.length,
        totalQuestions: combinedQuestions.length,
        contents: [combinedQuestions.join('')], // 合併成一個內容
        date: new Date().toLocaleDateString()
    };

    myExams.push(newExam);
    localStorage.setItem('myExams', JSON.stringify(myExams));
    alert('匯出成功！已放入考卷區。');
}

function action(type) {

        alert("這裡空空的，先去商店買種子來播種吧！");
        return;
    }
    
    // 檢查金錢是否足夠
    if (s.money < 10) {

// --- 更新花園畫面 ---
function updateGardenUI() {
    const soil = document.getElementById('garden-soil');

        soil.innerHTML = ''; // 空土丘
        return;
    }

    // 根據進度調整透明度或大小，模擬生長
    const opacity = 0.3 + (gardenState.progress / 100) * 0.7;
    const scale = 0.5 + (gardenState.progress / 100) * 0.5;

    if (gardenState.isPlanted && gardenState.progress >= 100) {
        const plant = gardenState.currentPlant;

        s.harvestCount++;
        s.backpack.push({ name: plant.n, icon: plant.i, date: new Date().toLocaleDateString() });

function renderBackpack(container) {
    if (s.backpack.length === 0) {
        container.innerHTML = `<div style="text-align:center; padding:40px; color:#AAA;">背包是空的，快去種花吧！</div>`;
        return;
    }

    let html = `<div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:10px;">`;
    s.backpack.forEach(item => {
        html += `
            <div style="background:white; padding:15px; border-radius:15px; border:1px solid #EEE; text-align:center;">
                <div style="font-size:2.5rem; margin-bottom:5px;">${item.icon}</div>
                <div style="font-weight:bold; font-size:0.9rem;">${item.name}</div>
                <div style="font-size:0.7rem; color:#CCC;">${item.date}</div>
            </div>
        `;
    });
    html += `</div>`;
    container.innerHTML = html;
}
        function closeModal() {
    const modal = document.getElementById('full-modal');
    if (modal) {
        modal.classList.remove('active');
    }
    
    // 額外小優化：每次關閉視窗時，順便更新一次主畫面的顯示資訊
    // 例如：更新主畫面上的金錢顯示 (假設你有一個 id 為 top-money 的元素)
    updateMainUI(); 
}

// 建立一個更新主畫面的函式，確保數據同步
function updateMainUI() {
    const moneyDisplay = document.getElementById('top-money');
    if (moneyDisplay && typeof s !== 'undefined') {
        moneyDisplay.innerText = `$${s.money}`;
    }
}

function getPlayerStats() {
    const totalQuizzes = quizRecords.length;
    let totalCorrect = 0;
    let totalQs = 0;

    quizRecords.forEach(rec => {
        totalCorrect += rec.correctCount;
        totalQs += rec.totalCount;
    });

    const accuracy = totalQs > 0 ? Math.round((totalCorrect / totalQs) * 100) : 0;
    
    return {
        count: totalQuizzes,
        accuracy: accuracy + "%"
    };
}
