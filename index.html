<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Secret Garden - 小花圃</title>
    <style>
        :root {
            --sky-blue: #87CEEB;
            --sky-gradient: linear-gradient(to bottom, #87CEEB 0%, #E0F7FA 100%);
            --soil-brown: #8D6E63;
            --soil-border: #A1887F;
            --btn-pink: #FFB6C1;
            --btn-pink-dark: #FF9EAE;
            --btn-green: #81C784;
            --text-color: #5D4037;
            --modal-bg: #FFF9F0;
            --card-bg: rgba(255, 255, 255, 0.8);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'PingFang TC', 'Heiti TC', sans-serif; /* 針對 iOS/Android 優化字體 */
            -webkit-tap-highlight-color: transparent; /* 移除手機點擊高亮色 */
        }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-color: var(--sky-blue);
        }

        /* --- 遊戲主畫面：藍天白雲花圃 --- */
        .game-scene {
            flex: 1;
            background: var(--sky-gradient);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* 內容垂直置中 */
            position: relative;
            padding-top: env(safe-area-inset-top);
        }

        /* 雲朵 (CSS 繪製) */
        .cloud {
            position: absolute;
            background: white;
            border-radius: 50px;
            opacity: 0.9;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            animation: cloudFloat 20s linear infinite;
        }
        .cloud::after, .cloud::before {
            content: '';
            position: absolute;
            background: white;
            border-radius: 50%;
        }
        .cloud.c1 { width: 80px; height: 30px; top: 15%; left: 10%; animation-duration: 25s; }
        .cloud.c1::after { width: 40px; height: 40px; top: -20px; left: 10px; }
        .cloud.c1::before { width: 30px; height: 30px; top: -10px; left: 40px; }

        .cloud.c2 { width: 100px; height: 40px; top: 10%; left: 60%; opacity: 0.8; animation-duration: 18s; animation-delay: -5s;}
        .cloud.c2::after { width: 50px; height: 50px; top: -25px; left: 15px; }
        .cloud.c2::before { width: 35px; height: 35px; top: -15px; left: 50px; }

        @keyframes cloudFloat {
            from { transform: translateX(-150px); }
            to { transform: translateX(calc(100vw + 150px)); }
        }

        /* 置中的單個小花圃 */
        .garden-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .garden-bed {
            width: 150px;
            height: 100px;
            background: var(--soil-brown);
            border: 6px solid var(--soil-border);
            border-radius: 20px;
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.2), 0 5px 15px rgba(0,0,0,0.1);
            position: relative;
        }
        
        /* 土壤花紋 */
        .garden-bed::after {
            content: '．. ．';
            position: absolute;
            color: var(--soil-border);
            font-size: 1.2rem;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0.5;
        }

        /* 種植按鈕 */
        .plant-btn {
            background: var(--btn-green);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: bold;
            box-shadow: 0 5px 0 #66BB6A;
            cursor: pointer;
            transition: all 0.1s;
        }
        .plant-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #66BB6A;
        }

        /* --- 底部導覽列 (防誤觸設計) --- */
        nav {
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 10px calc(15px + env(safe-area-inset-bottom));
            border-top: 1px solid #E0E0E0;
            z-index: 10;
        }
        .nav-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 8px;
        }
        .nav-row:last-child { margin-bottom: 0; }
        .nav-btn {
            background: white;
            border: 2px solid var(--btn-pink);
            border-radius: 12px;
            padding: 8px 0;
            text-align: center;
            font-size: 0.8rem;
            font-weight: bold;
            color: var(--text-color);
            box-shadow: 0 3px 0 var(--btn-pink);
            transition: all 0.1s;
        }
        .nav-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 var(--btn-pink);
        }

        /* --- 全螢幕覆蓋視窗 (Modals) --- */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--modal-bg);
            z-index: 100;
            display: flex;
            flex-direction: column;
            transform: translateY(100%);
            transition: transform 0.3s ease-out;
            padding-top: env(safe-area-inset-top);
        }
        .modal.active { transform: translateY(0); }

        .modal-header {
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #E0E0E0;
        }
        .back-btn {
            background: var(--btn-pink);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
        }
        .modal-body {
            flex: 1;
            padding: 20px;
            overflow-y: auto; /* 內容過多時可滾動 */
        }

        /* --- 種子選擇視窗專用樣式 --- */
        .seed-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 手機端兩列最剛好 */
            gap: 15px;
        }
        .seed-card {
            background: var(--card-bg);
            border: 2px solid #E0E0E0;
            border-radius: 15px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: border-color 0.2s;
        }
        .seed-card:active {
            border-color: var(--btn-green);
            background: white;
        }
        .seed-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }
        .seed-name {
            font-weight: bold;
            color: var(--text-color);
            margin-bottom: 5px;
        }
        .seed-count {
            font-size: 0.8rem;
            color: #757575;
            background: #EEEEEE;
            padding: 2px 8px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="game-scene">
        <div class="cloud c1"></div>
        <div class="cloud c2"></div>
        
        <div class="garden-container">
            <div class="garden-bed"></div>
            <button class="plant-btn" onclick="openSeedModal()">🌱 種植</button>
        </div>
    </div>

    <nav>
        <div class="nav-row">
            <div class="nav-btn">🎒背包</div>
            <div class="nav-btn">🛒商店</div>
            <div class="nav-btn" style="background: #FFF9C4; border-color: #FFEB3B; box-shadow: 0 3px 0 #FDD835;">📝答題</div>
            <div class="nav-btn">👤玩家</div>
        </div>
        <div class="nav-row">
            <div class="nav-btn">📄考卷</div>
            <div class="nav-btn">📚題庫</div>
            <div class="nav-btn">❌錯題</div>
            <div class="nav-btn">⚙️設定</div>
        </div>
    </nav>

    <div id="seed-modal" class="modal">
        <div class="modal-header">
            <h2>選擇種子</h2>
            <button class="back-btn" onclick="closeModal()">返回 ↩</button>
        </div>
        <div class="modal-body">
            <div class="seed-grid">
                <div class="seed-card" onclick="selectSeed('🌻 向日葵')">
                    <div class="seed-icon">🌻</div>
                    <div class="seed-name">向日葵</div>
                    <div class="seed-count">擁有: 5</div>
                </div>
                <div class="seed-card" onclick="selectSeed('🌷 鬱金香')">
                    <div class="seed-icon">🌷</div>
                    <div class="seed-name">鬱金香</div>
                    <div class="seed-count">擁有: 2</div>
                </div>
                <div class="seed-card" onclick="selectSeed('🌹 玫瑰')">
                    <div class="seed-icon">🌹</div>
                    <div class="seed-name">玫瑰</div>
                    <div class="seed-count">擁有: 1</div>
                </div>
                <div class="seed-card" onclick="selectSeed('🌸 櫻花')">
                    <div class="seed-icon">🌸</div>
                    <div class="seed-name">櫻花</div>
                    <div class="seed-count">擁有: 8</div>
                </div>
                <div class="seed-card" onclick="selectSeed('🌺 扶桑花')">
                    <div class="seed-icon">🌺</div>
                    <div class="seed-name">扶桑花</div>
                    <div class="seed-count">擁有: 3</div>
                </div>
                <div class="seed-card" onclick="selectSeed('🌼 雛菊')">
                    <div class="seed-icon">🌼</div>
                    <div class="seed-name">雛菊</div>
                    <div class="seed-count">擁有: 10</div>
                </div>
                <div class="seed-card" onclick="selectSeed('🍀 四葉草')">
                    <div class="seed-icon">🍀</div>
                    <div class="seed-name">四葉草</div>
                    <div class="seed-count">擁有: 0</div>
                </div>
                <div class="seed-card" onclick="selectSeed('🌵 仙人掌')">
                    <div class="seed-icon">🌵</div>
                    <div class="seed-name">仙人掌</div>
                    <div class="seed-count">擁有: 4</div>
                </div>
                <div class="seed-card" onclick="selectSeed('🌿 薰衣草')">
                    <div class="seed-icon">🌿</div>
                    <div class="seed-name">薰衣草</div>
                    <div class="seed-count">擁有: 6</div>
                </div>
                <div class="seed-card" onclick="selectSeed('🍄 奇幻菇')">
                    <div class="seed-icon">🍄</div>
                    <div class="seed-name">奇幻菇</div>
                    <div class="seed-count">擁有: 1</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function openSeedModal() {
            document.getElementById('seed-modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('seed-modal').classList.remove('active');
        }

        function selectSeed(seedName) {
            // 這裡可以加入判斷數量是否大於 0 的邏輯
            alert('你選擇了 ' + seedName + '，準備開始種植！(這裡之後可以對接種植邏輯)');
            closeModal();
            
            // 範例：在花圃顯示植物 (這部分功能你說先不要，但我預留好位置了)
            // document.querySelector('.garden-bed').innerHTML = `<div style="font-size:4rem; text-align:center; line-height:100px;">${seedName.split(' ')[0]}</div>`;
        }
    </script>
</body>
</html>
