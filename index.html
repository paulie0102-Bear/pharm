<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Secret Garden - 互動版面</title>
    <style>
        :root {
            --sky-blue: #87CEEB;
            --btn-color: #FFB6C1;
            --text-color: #5D4037;
            --modal-bg: #FFF9F0; /* 溫暖的米色背景 */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }

        body {
            background: linear-gradient(to bottom, #87CEEB, #E0F7FA);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 主畫面：藍天花圃 */
        .game-scene {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            position: relative;
        }

        .garden-bed {
            width: 90%;
            height: 120px;
            background: #8D6E63;
            border: 6px solid #A1887F;
            border-radius: 25px 25px 0 0;
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            padding-bottom: 15px;
        }

        /* 底部導覽列 (防誤觸設計) */
        nav {
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 10px calc(15px + env(safe-area-inset-bottom));
            border-top: 2px solid #F0F0F0;
            z-index: 10;
        }

        .nav-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 8px;
        }

        .nav-btn {
            background: white;
            border: 2px solid var(--btn-color);
            border-radius: 12px;
            padding: 8px 0;
            text-align: center;
            font-size: 0.8rem;
            font-weight: bold;
            color: var(--text-color);
            box-shadow: 0 3px 0 var(--btn-color);
            cursor: pointer;
        }

        .nav-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 var(--btn-color); }

        /* 全螢幕覆蓋視窗 (Modals) */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--modal-bg);
            z-index: 100;
            display: flex;
            flex-direction: column;
            transform: translateY(100%); /* 初始隱藏在下方 */
            transition: transform 0.3s ease-out;
            padding-top: env(safe-area-inset-top); /* 避免被動態島或瀏海擋住 */
        }

        .modal.active {
            transform: translateY(0); /* 顯示視窗 */
        }

        /* 視窗頂部欄 */
        .modal-header {
            padding: 15px;
            display: flex;
            align-items: center;
            border-bottom: 2px dashed var(--btn-color);
        }

        .back-btn {
            background: var(--btn-color);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            margin-right: 15px;
        }

        .modal-body {
            flex: 1;
            padding: 20px;
            text-align: center;
            overflow-y: auto;
        }

        .icon-large { font-size: 4rem; display: block; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="game-scene">
        <div class="garden-bed">
            <span>🌷</span><span>🌻</span><span>🌸</span><span>🌱</span>
        </div>
    </div>

    <nav>
        <div class="nav-row">
            <div class="nav-btn" onclick="openModal('backpack')">🎒背包</div>
            <div class="nav-btn" onclick="openModal('shop')">🛒商店</div>
            <div class="nav-btn" onclick="openModal('quiz')">📝答題</div>
            <div class="nav-btn" onclick="openModal('player')">👤玩家</div>
        </div>
        <div class="nav-row">
            <div class="nav-btn" onclick="openModal('exam')">📄考卷</div>
            <div class="nav-btn" onclick="openModal('bank')">📚題庫</div>
            <div class="nav-btn" onclick="openModal('wrong')">❌錯題</div>
            <div class="nav-btn" onclick="openModal('settings')">⚙️設定</div>
        </div>
    </nav>

    <div id="modal-container">
        </div>

    <script>
        // 定義每個分頁的內容
        const pages = {
            backpack: { title: "我的背包", icon: "🎒", content: "這裡顯示你擁有的種子與道具。" },
            shop: { title: "花園商店", icon: "🛒", content: "購買新的花卉與裝飾品。" },
            quiz: { title: "開始答題", icon: "📝", content: "準備好接受挑戰了嗎？" },
            player: { title: "玩家資訊", icon: "👤", content: "查看你的等級與成就。" },
            exam: { title: "模擬考卷", icon: "📄", content: "挑選一份考卷來練習吧。" },
            bank: { title: "題庫瀏覽", icon: "📚", content: "複習所有的知識。" },
            wrong: { title: "錯題筆記", icon: "❌", content: "從錯誤中學習是進步最快的方式。" },
            settings: { title: "系統設定", icon: "⚙️", content: "調整音效、通知與個人化設定。" }
        };

        function openModal(pageKey) {
            const data = pages[pageKey];
            const modalHtml = `
                <div id="modal-${pageKey}" class="modal active">
                    <div class="modal-header">
                        <button class="back-btn" onclick="closeModal('modal-${pageKey}')">⬅ 返回</button>
                        <h2>${data.title}</h2>
                    </div>
                    <div class="modal-body">
                        <span class="icon-large">${data.icon}</span>
                        <p>${data.content}</p>
                    </div>
                </div>
            `;
            document.getElementById('modal-container').innerHTML = modalHtml;
            
            // 稍微延遲讓動畫能觸發
            setTimeout(() => {
                document.getElementById(`modal-${pageKey}`).classList.add('active');
            }, 10);
        }

        function closeModal(id) {
            const el = document.getElementById(id);
            el.classList.remove('active');
            // 動畫結束後移除元素，節省資源
            setTimeout(() => { el.remove(); }, 300);
        }
    </script>

</body>
</html>
